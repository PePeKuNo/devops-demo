proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

# Łączę dwa kontenery backendu w jeden upstream do load balancingu
upstream backend_cluster {
    # Domyślnie Nginx rozdziela ruch algorytmem Round Robin
    server api-a:3000;
    server api-b:3000;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/stats {
        # Kieruję statystyki do wspólnego upstreamu i włączam cache
        proxy_pass http://backend_cluster/stats;
        proxy_cache my_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/ {
        # Pozostałe żądania API też przekazuję przez upstream
        proxy_pass http://backend_cluster/;
    }
}
